name: build-isos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

concurrency:
  group: build-isos
  cancel-in-progress: true

env:
  CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
  CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Aggressive cleanup
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3.6.0
        with:
          platforms: arm64

      - name: Install Nix
        uses: cachix/install-nix-action@v31.6.1
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux

      - name: Use Cachix
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ env.CACHIX_SIGNING_KEY }}

      - name: Build x86_64 ISO
        run: |
          cachix watch-exec "$CACHIX_CACHE" -- \
            nix build .#install-iso --print-build-logs --out-link result-x86

      - name: Build aarch64 ISO
        run: |
          cachix watch-exec "$CACHIX_CACHE" -- \
            nix build .#packages.aarch64-linux.install-iso --print-build-logs --out-link result-arm

      - name: Upload x86_64 ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: install-iso-x86_64
          path: result-x86/iso/*.iso
          if-no-files-found: error

      - name: Upload aarch64 ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: install-iso-aarch64
          path: result-arm/iso/*.iso
          if-no-files-found: error

      - name: Publish release (rolling)
        if: ${{ github.ref == 'refs/heads/master' }}
        run: |
          set -eu
          tag=rolling
          files="$(echo result-x86/iso/*.iso) $(echo result-arm/iso/*.iso)"
          title="Rolling installer ISOs"
          notes="Automated build $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" $files --clobber
          else
            gh release create "$tag" $files --title "$title" --notes "$notes"
          fi
