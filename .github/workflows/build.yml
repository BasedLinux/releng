name: build-isos

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/5 * * * *"     # shortest allowed interval (UTC)
  push:
    branches: ["**"]          # master + feature branches
  pull_request:
    branches: ["**"]

permissions:
  contents: write             # push flake.lock + manage releases

concurrency:
  group: build-isos
  cancel-in-progress: true

env:
  CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
  CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Aggressive cleanup
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - uses: actions/checkout@v5.0.0

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3.6.0
        with:
          platforms: arm64

      - name: Install Nix
        uses: cachix/install-nix-action@v31.6.1
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux

      - name: Use Cachix
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ env.CACHIX_SIGNING_KEY }}

      - name: nix flake update
        run: nix flake update

      - name: Build x86_64 ISO
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            cachix watch-exec "$CACHIX_CACHE" -- \
              nix build .#install-iso --print-build-logs --out-link result-x86
          else
            nix build .#install-iso --print-build-logs --out-link result-x86
          fi

      - name: Build aarch64 ISO
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            cachix watch-exec "$CACHIX_CACHE" -- \
              nix build .#packages.aarch64-linux.install-iso --print-build-logs --out-link result-arm
          else
            nix build .#packages.aarch64-linux.install-iso --print-build-logs --out-link result-arm
          fi

      - name: Prepare artifacts and checksums
        id: sums
        run: |
          set -eu
          mkdir -p dist
          X86=(result-x86/iso/*.iso)
          ARM=(result-arm/iso/*.iso)
          cp -f "${X86[0]}" dist/install-iso-x86_64.iso
          cp -f "${ARM[0]}" dist/install-iso-aarch64.iso
          sha256sum dist/install-iso-x86_64.iso | tee dist/install-iso-x86_64.sha256
          sha256sum dist/install-iso-aarch64.iso | tee dist/install-iso-aarch64.sha256

      - name: Determine if publish is needed
        id: decide
        if: ${{ github.ref == 'refs/heads/master' }}
        run: |
          set -eu
          publish_needed=1
          tmpdir="$(mktemp -d)"
          if gh release view rolling >/dev/null 2>&1; then
            gh release download rolling -p "install-iso-*.iso" -D "$tmpdir" || true
            oldx="$( [ -f "$tmpdir/install-iso-x86_64.iso" ] && sha256sum "$tmpdir/install-iso-x86_64.iso" | awk '{print $1}' || echo '' )"
            olda="$( [ -f "$tmpdir/install-iso-aarch64.iso" ] && sha256sum "$tmpdir/install-iso-aarch64.iso" | awk '{print $1}' || echo '' )"
            newx="$(awk '{print $1}' dist/install-iso-x86_64.sha256)"
            newa="$(awk '{print $1}' dist/install-iso-aarch64.sha256)"
            if [ "$oldx" = "$newx" ] && [ "$olda" = "$newa" ]; then
              publish_needed=0
            fi
          fi
          echo "publish=$publish_needed" >> "$GITHUB_OUTPUT"

      - name: Upload x86_64 ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: install-iso-x86_64
          path: dist/install-iso-x86_64.iso
          if-no-files-found: error

      - name: Upload aarch64 ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: install-iso-aarch64
          path: dist/install-iso-aarch64.iso
          if-no-files-found: error

      - name: Publish release (rolling)
        if: ${{ github.ref == 'refs/heads/master' && steps.decide.outputs.publish == '1' }}
        run: |
          set -eu
          tag=rolling
          title="Rolling installer ISOs"
          notes="Automated build from $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              dist/install-iso-x86_64.iso \
              dist/install-iso-aarch64.iso \
              --clobber
          else
            gh release create "$tag" \
              dist/install-iso-x86_64.iso \
              dist/install-iso-aarch64.iso \
              --title "$title" \
              --notes "$notes"
          fi

      - name: Commit updated flake.lock
        if: ${{ github.ref == 'refs/heads/master' && steps.decide.outputs.publish == '1' }}
        run: |
          if ! git diff --quiet -- flake.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add flake.lock
            git commit -m "ci: update flake.lock"
            git push
          fi
