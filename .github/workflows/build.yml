name: build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: true

env:
  CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
  CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            target: install-iso
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: packages.aarch64-linux.install-iso
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.6.1

      - name: Use Cachix
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ env.CACHIX_SIGNING_KEY }}

      - name: Build ISO
        run: |
          cachix watch-exec "$CACHIX_CACHE" -- \
            nix build .#${{ matrix.target }} --out-link result

      - name: Upload ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: install-iso-${{ matrix.arch }}
          path: result/iso/*.iso
          if-no-files-found: error

  publish:
    needs: build
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create new release and upload ISOs
        run: |
          set -euo pipefail
          tag="beta-$(date +%s)"
          files="$(find dist -type f -name '*.iso' | sort)"
          gh release create "$tag" $files --title "Beta ISOs $tag" --notes "Automated build $tag"
