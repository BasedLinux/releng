name: build-isos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

concurrency:
  group: build-isos
  cancel-in-progress: true

env:
  CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
  CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
  CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            target: install-iso
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: packages.aarch64-linux.install-iso
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.6.1

      - name: Use Cachix
        uses: cachix/cachix-action@v16
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ env.CACHIX_SIGNING_KEY }}

      - name: Build ISO
        run: |
          cachix watch-exec "$CACHIX_CACHE" -- \
            nix build .#${{ matrix.target }}

      - name: Upload ISO (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: install-iso-${{ matrix.arch }}
          path: result/iso/*.iso
          if-no-files-found: error

  publish:
    needs: build
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release named after ISO base
        run: |
          set -euo pipefail
          mapfile -t files < <(find dist -type f -name '*.iso' | sort)
          # Derive common base: strip dir + ".iso" + "-{arch}-linux"
          bases=()
          for f in "${files[@]}"; do
            n="${f##*/}"; n="${n%.iso}"
            n="${n%-x86_64-linux}"; n="${n%-aarch64-linux}"
            bases+=("$n")
          done
          base="${bases[0]}"
          for b in "${bases[@]}"; do
            if [ "$b" != "$base" ]; then
              # Fallback if bases differ for some reason
              base="beta-$(date +%s)"
              break
            fi
          done
          gh release create "$base" "${files[@]}" \
            -R "$GITHUB_REPOSITORY" \
            --title "$base"
